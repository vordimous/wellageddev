{{ define "main" }}
<h1 class="pg-title">{{ .Title | emojify }}</h1>
{{ with .Params.summary }}<p class="post-summary">{{ . }}</p>{{ end }}
<div class="meta">
  {{ partial "single/meta.html" . }}
  {{ partial "single/meta-tags.html" . }}
</div>

<div class="roast-methods">
  {{ .Content }}
</div>

<style>
  table.roast-ref {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0 1.5em;
    font-size: 0.95em;
  }
  table.roast-ref th,
  table.roast-ref td {
    padding: 0.5em 0.75em;
    border-bottom: 1px solid var(--border, #ddd);
    text-align: left;
    vertical-align: top;
  }
  table.roast-ref th { font-weight: 600; }
  .roast-methods code { font-size: 0.95em; }
</style>
{{ end }}
