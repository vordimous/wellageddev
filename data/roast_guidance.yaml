# Roast guidance reference values.
# Single source of truth — consumed by the single-page expected-range panel
# AND by the public /roasts/methods/ documentation page so they can't drift.
#
# Sources (industry consensus, not Behmor-specific):
#   - Genuine Origin, "Roast Profiles 101" (target DTR 16–20% across origins)
#   - Scott Rao, "The Coffee Roaster's Companion" (DTR > ~24% risks baking)
#   - Sweet Maria's roast color guide (loss % per level)
#   - Bodhi Leaf, "Behmor 1600 Plus Roasting Guide"
#
# These are starting points. Calibrate against your own logged batches.

levels:
  - name: light
    loss_pct: [12, 14]
    dtr_pct: [16, 19]
    drop: "15–45s after FC starts, before any oil sheen"
    flavor: "Bright acidity, floral/fruit forward, origin-distinct"
  - name: light-medium
    loss_pct: [13, 15]
    dtr_pct: [17, 20]
    drop: "30–60s into development, before FC fully winds down"
    flavor: "Balanced acidity, sweetness emerging, origin still legible"
  - name: medium
    loss_pct: [14, 16]
    dtr_pct: [18, 22]
    drop: "End of FC through 1:30–2:30 of development, before SC"
    flavor: "Caramel / cocoa, balanced body, low acidity"
  - name: medium-dark
    loss_pct: [16, 18]
    dtr_pct: [19, 23]
    drop: "First few snaps of second crack"
    flavor: "Roasty notes appearing, body forward, less origin character"
  - name: dark
    loss_pct: [18, 20]
    dtr_pct: [20, 24]
    drop: "Rolling SC, before oil floods the surface"
    flavor: "Smoke / spice / bitter, body dominant"
    behmor_warning: "The Behmor 1600 Plus manual warns against Vienna / French / Italian dark roasts on this machine — oily beans accumulating in the chaff tray are a fire risk. Stop before a heavy oil sheen develops."

# Behmor 1600 Plus: recommended weight-button setting per actual charge.
# The Behmor manual recommends matching the setting to the charge.
# For very small charges (¼ lb), overshooting by ONE class is a defensible
# tweak to keep the roast moving without scorching — but is forum wisdom,
# not in the official guide. Treat it as experimental.
behmor_weight_settings:
  - label: "¼ lb (≈113 g)"
    charge_min: 70
    charge_max: 150
    setting: "½ lb"
    note: "One class over matched. Forum-suggested for very small charges to avoid stalling. The official guide says use the matched (¼ lb) setting; try both."
  - label: "½ lb (≈227 g)"
    charge_min: 150
    charge_max: 320
    setting: "½ lb"
    note: "Matched. Manual's intended setup for this batch size."
  - label: "1 lb (≈454 g)"
    charge_min: 320
    charge_max: 500
    setting: "1 lb"
    note: "Matched. Max-comfort batch on the 1600 Plus."

formulas:
  - name: Weight loss %
    formula: "(green_weight_g − roasted_weight_g) / green_weight_g × 100"
    purpose: "Rough roast-development proxy. Heavier loss = more developed."
  - name: Development time
    formula: "total_time − time_to_fc"
    purpose: "How long the bean spent post-first-crack. Drives sweetness and body."
  - name: DTR (development time ratio) %
    formula: "development_time / total_time × 100"
    purpose: "Share of the roast spent in development. Genuine Origin targets 16–20% across origins; > ~24% risks baked / flat cup (Rao)."
