# Architecture docs: content/roasts/CLAUDE.md
#
# Behmor 2000 AB Plus — machine-specific roasting guidance.
# Sourced primarily from the official Operation Manual V30 (Oct 2024).
#
# Sources:
#   - 2000AB 120V Operation Manual V30 (Oct 21 2024): http://www.behmor.com/docs/Behmor%202000AB%20120v%20Operation%20Manual%20V28%2011.19.2023%20BW%20Inspired.pdf
#   - Quick Start Guide: https://behmor.com/knowledge-base/behmor-roaster-quick-start-guide/
#   - Control Panel & Auto-Safety Shutoff: https://behmor.com/knowledge-base/behmor-roaster-control-panel-features-auto-safety-shutoff/

name: Behmor 2000 AB Plus
reference_url: "/roasts/behmor-2000ab/"
manual_url: "http://www.behmor.com/docs/Behmor%202000AB%20120v%20Operation%20Manual%20V28%2011.19.2023%20BW%20Inspired.pdf"
knowledge_base_url: "https://behmor.com/knowledge-base/"

# ─────────────────────────────────────────────────────────────────────────
# CRITICAL: P1–P5 mean two different things depending on mode.
#
# In AUTO mode (chosen before pressing Start) — origin-specific profile.
# In MANUAL mode (pressed AFTER Start) — power level (0/25/50/75/100%).
#
# This is the single most important fact about operating this machine.
# ─────────────────────────────────────────────────────────────────────────

# Auto mode profiles per Manual Part 3 "Select and Set Roasting Profile".
# Choose based on the bean's origin/hardness BEFORE pressing Start.
auto_mode_profiles:
  - id: P1
    label: "P1 (default) — Hard Bean, Highest Heat"
    bean_type: "Hard bean (SHB / HG, high-grown)"
    origins: ["All Centrals", "Peruvian", "Colombian"]
    notes: "Default profile. The manual recommends new users do four ¼ lb batches on P1 to learn the machine."
  - id: P2
    label: "P2 — Hard Bean (gentler)"
    bean_type: "Hard bean (SHB / HG, high-grown)"
    origins: ["All Centrals", "Peruvian", "Colombian"]
    notes: "Less aggressive than P1 for the same regions; useful for a softer entry into FC on dense lots."
  - id: P3
    label: "P3 — Soft Bean / Low-grown / Espresso Blend"
    bean_type: "Soft bean / low-grown"
    origins: ["Brazilians", "Africans", "Southeast Asian", "Malabar", "Jamaican Blue Mountain", "Yauco Selecto"]
    notes: "Add time via + or C button — P3–P5 auto programs may need extension."
  - id: P4
    label: "P4 — Low-grown island, just into 2C"
    bean_type: "Soft / low-grown island"
    origins: ["Kona", "low-grown island coffees"]
    notes: "Used for taking Kona-style beans just into second crack."
  - id: P5
    label: "P5 — Island coffees, City / City+, Lowest Heat"
    bean_type: "Soft / low-grown island"
    origins: ["Kona", "low-grown island coffees"]
    notes: "Lowest heat profile. Used for keeping island coffees shy of second crack at City/City+."

# Manual mode power levels — ONLY active after a roast has started.
# Press any P button mid-roast to drop into Manual mode for that power level.
manual_mode_powers:
  - id: P1
    power_pct: 0
    label: "0% — drum rotation only"
    use: "Stalls heat; lets exothermic momentum carry. Press 1 button to return to Auto."
    post_fc_ok: true
  - id: P2
    power_pct: 25
    label: "25%"
    use: "Gentle finishing power."
    post_fc_ok: true
  - id: P3
    power_pct: 50
    label: "50% — recommended development setting"
    use: "Manual recommends pressing P3 ~10–15 sec after FC starts to drop power and let beans' exothermic momentum carry. Combine with D button."
    post_fc_ok: true
  - id: P4
    power_pct: 75
    label: "75%"
    use: "Pre-FC drying / Maillard only."
    post_fc_ok: false
    warning: "Not recommended after first crack (manual: combined with bean-mass heat may scorch)."
  - id: P5
    power_pct: 100
    label: "100% — full power"
    use: "Pre-FC drying phase only."
    post_fc_ok: false
    warning: "Not recommended after first crack (manual: combined with bean-mass heat may scorch)."

# The "Professional Sample Roasting" technique from manual Part 5 Tips.
# Quoted: "Once user hears First Cracking sound wait appx :10-15 seconds.
# Press: the P3 button then d button. **For FC you may need to add time
# using the + button or c button. Press the cool button as needed."
#
# WHEN TO USE: small-batch evaluation / sample roasting (tiny lots, controlled
# tasting). The 50% power cut intentionally stalls development for a slow,
# even finish — useful when the goal is preserving raw bean characteristics
# for cupping, not hitting a target weight loss for drinking coffee.
#
# WHEN NOT TO USE: drinking-coffee roasts at ½ lb or 1 lb. The P3 power cut
# at FC+15s starves development heat — observed failure mode on roasts 006
# and 007: 8–9.4% weight loss vs 13–16% target, DTR 38%+ vs 17–22% target.
# Beans tumble at 50% power for 5+ minutes losing minimal mass.
#
# For drinking coffee → use `c_button_technique` below instead.
pro_sample_roasting:
  start_profile: P1
  start_mode: Auto
  fc_action: "10–15 seconds after FC starts, press P3 (drops power to 50%) then D (raises drum speed)."
  rationale: "Cutting power to 50% sustains heat but lets the beans' exothermic momentum carry the roast, preventing scorching."
  time_extension: "You will likely need to add time using the + button or C button to extend through development."
  appropriate_use: "Sample roasting / cupping evaluation — small batches where slow, even, low-development finish is intentional."
  inappropriate_use: "Drinking-coffee development at ½ lb or 1 lb. Use c_button_technique instead."

# The "C-button + Auto P1 hold" technique — forum/SM-library consensus for
# hitting proper development on drinking-coffee batches. Synthesizes:
#   - Behmor KB: "C button … press it numerous times towards the end of the
#     roast, extending available roast times" (low-voltage handling)
#   - Sweet Maria's library: P1 Auto is the right preset for light roasts
#   - Home-Barista forum: "load beans, hit start with full power, then at
#     first crack hit the 'C' button, switch to P3, and press the + button
#     2 or 3 times" — the C-at-FC is the key step
#
# Core idea: keep full Auto P1 heat through development; use C (not +) to
# extend; use P3 only as a brake near 2C, not as the default post-FC mode.
c_button_technique:
  start_profile: P1
  start_mode: Auto
  fc_action: "At FC: press C immediately. Stay on Auto P1 (do NOT switch to manual P3 yet)."
  c_button_effect: "Resets timer to Rosetta Stone 1C→2C development window, bypasses Err 7, no per-roast cap on presses."
  development_heat: "Full Auto P1 heat continues through FC body. This is the inverse of pro_sample_roasting."
  brake: "Drop to P3 ONLY if 2C threatens (rapid louder snaps, acrid smoke shift, oil sheen) — not as the default post-FC mode."
  time_extension: "Press C again as needed. Each press resets the timer; no documented cumulative cap."
  rationale: "P3 at 50% for the entire development phase stalls heat needed for moisture drive-off and Maillard progression on ½ lb+ batches. Holding Auto P1 with C-shaped timing delivers full development at the bean's actual stage."
  appropriate_use: "Drinking-coffee batches at ½ lb or 1 lb, targeting City through Full City."
  inappropriate_use: "Sample roasting where slow controlled finish is intentional → use pro_sample_roasting."

# Per-button extension behavior comparison — the difference between + and C
# matters because the + button has a per-roast cap and 007 hit it at +2:00.
time_extension_buttons:
  plus_button:
    increment: "~10 seconds per press"
    cap: "Per-roast cumulative cap exists (undocumented exact value; ~+2:00 observed on roast 007 at ½ lb / P1)."
    use: "Fine-tuning small adjustments inside the documented program time."
  c_button:
    increment: "Resets timer to Rosetta Stone 1C→2C window for the active weight setting"
    cap: "None documented. Behmor KB explicitly allows multiple presses 'towards the end of the roast' for low-voltage extension."
    use: "Primary extension mechanism. Press at FC for correct development window; press again if voltage/humidity slows the roast."

# Weight button sets DEFAULT PROGRAM TIME, not heat.
# The 75% safety shutoff fires at 75% of this default time.
weight_settings:
  - label: "¼ lb (≈113 g)"
    charge_min: 70
    charge_max: 150
    setting: "¼ lb"
    program_time: "8:30"
    shutoff_elapsed: "6:22"
    shutoff_remaining: "2:08"
    note: "Manual's official beginner starting point: \"NEVER START with quantities above ¼ lb\" until familiar with the roaster. Start with four ¼ lb batches on P1."
  - label: "½ lb (≈227 g)"
    charge_min: 150
    charge_max: 320
    setting: "½ lb"
    program_time: "12:00"
    shutoff_elapsed: "9:00"
    shutoff_remaining: "3:00"
    note: "Move here once comfortable with ¼ lb roasts. 75% shutoff at 9 min elapsed — often coincides with FC."
  - label: "1 lb (≈454 g)"
    charge_min: 320
    charge_max: 500
    setting: "1 lb"
    program_time: "18:00"
    shutoff_elapsed: "13:30"
    shutoff_remaining: "4:30"
    note: "Full batch capacity. For Full City+ darker, manual recommends REDUCING to 336 g (12 oz) for control — full pound retains too much thermal momentum past City+."

preheat:
  duration_sec: 90
  instruction: "Press any weight button + any profile + START, run for 1:30 with drum OUT. Press OFF, insert drum + tray, then start the actual roast. Manual warns: longer than 1:30 can trigger a safety feature that prevents starting the roast."
  max_duration_warning: "Do NOT exceed 1:30 preheat — locks out the roast start."

safety:
  shutoff_name: "Err 7 / Unattended Safety Shutoff"
  shutoff_trigger: "75% through program time"
  shutoff_action: "Press START within 0:30 countdown or machine enters cool mode. The C button (Rosetta Stone) also bypasses Err 7 by signaling active interaction."
  between_roasts_minutes: 60
  between_roasts_quote: "\"Allow 1 hour between roasts\" — Manual Part 4."
  past_2c_warning: "Never roast past 10 seconds into second crack. The manual repeatedly warns that beans can ignite past this point."
  dark_roast_warning: "The Behmor 2000 AB Plus manual states explicitly: \"The Behmor Roaster is not intended to roast coffee to levels known as Vienna, French, or Italian.\" Oily beans accumulate in the chaff tray as a fire risk. For Full City+, reduce batch to 336 g."

# C button is the "Rosetta Stone" feature — resets timer to approximate
# 1C → 2C time per weight setting, and bypasses Err 7 by signaling
# active user interaction.
c_button:
  function: "Rosetta Stone — resets timer to approximate 1C → 2C time for the selected weight, using P1 Auto Mode timing as the baseline."
  side_effects:
    - "Bypasses Err 7 unattended-shutoff safety prompt"
    - "Can be pressed multiple times near end of roast to extend total time in low-voltage situations"
    - "Use to add time in larger increments than the +/- buttons"

temperature_buttons:
  A: "Exhaust channel temperature (available once exhaust fan activates mid-roast)"
  B: "Chamber wall temperature"
  note: "Neither A nor B reads bean temperature. Manual is explicit: \"These temps ARE NOT bean temps and for information / correlation purposes only. Never gauge degree of roast based on these temps.\""

drum_speed:
  button: D
  states: ["standard", "high"]
  toggle_behavior: "Press D once to switch from standard → high (or back). Pairs with P3 in the Pro Sample Roasting technique."
  manual_quote: "\"Button D - drum / cylinder motor speed toggle from standard to high.\" The manual states this on two pages with two different RPM ranges (\"16 rpm → 32 rpm\" in one recap, \"8 rpm → 16 rpm\" in another). Treat absolute RPM as approximate; what's reliable is the toggle behavior and its role in the pro technique."
  use_with_p3: "After FC + 10-15s, the manual's pro technique says press P3 then D — dropping element power to 50% while raising drum tumbling rate. Beans get more even surface contact at the lower sustained power."

beginner_guidance:
  - "Never start above ¼ lb when first learning the roaster."
  - "Roast at least four ¼ lb batches on P1 to learn FC sounds, color changes, smell cues, and how the C button works."
  - "After ¼ lb is comfortable, move to ½ lb. Move to 1 lb last."
  - "Always forward-think your roast by 15 seconds — that's how long it takes to reverse from roast to cool."
  - "Never gauge degree of roast by appearance of oils on bean surface — the Behmor is a drum roaster; oils appear 24h–several days post-roast."

cleaning:
  cadence: "Every 5 roasts (more often for darker roasts)"
  method: "Dry burn (¼ lb + Start, run full program) after cleaning interior with Simple Green or other non-caustic / non-abrasive cleaner. Never spray heating elements. Keep the back-lower-right corner of the roasting chamber clean — thermocouple sensor lives there."
